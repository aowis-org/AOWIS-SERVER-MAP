<VirtualHost *:80>
    ServerName aowis-map.localhost

    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass        / http://localhost:8122/
    ProxyPassReverse / http://localhost:8122/

    # --- Remove ALL backend CORS headers ---
    Header always unset Access-Control-Allow-Origin
    Header always unset Access-Control-Allow-Methods
    Header always unset Access-Control-Allow-Headers
    Header always unset Access-Control-Allow-Credentials
    Header always unset Access-Control-Expose-Headers
    Header always unset Access-Control-Max-Age

    # --- Capture Origin header ---
    SetEnvIfNoCase Origin "^(.*)$" ORIGIN=$1

    # --- Echo Origin (required when credentials=true) ---
    Header always set Access-Control-Allow-Origin "%{ORIGIN}e" env=ORIGIN
    Header always set Access-Control-Allow-Credentials "true"

    # --- Allowed methods ---
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"

    # --- FIX: Explicitly allow all headers Firefox may request ---
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin, User-Agent, Referer, Cache-Control, Pragma"

    # --- Preflight handling (OPTIONS must return 200) ---
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} =OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </IfModule>

    Header always set Access-Control-Max-Age "86400"
</VirtualHost>
